name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@a54c7afa936fefeb4456b2dd8068152669aa8ca1 # stable
        with:
          toolchain: stable

      - uses: swatinem/rust-cache@f0deed1e0edfc6a9be95417288c0e1099b1eeec3 # v2.7.7
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: purergb-windows
          path: |
            src-tauri/target/release/purergb.exe
            src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 14

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: purergb-windows
          path: artifacts

      - name: Rename portable exe
        run: |
          cp artifacts/purergb.exe "artifacts/PureRGB-portable.exe" 2>/dev/null || true
          find artifacts -name "*.exe" -type f

      - name: Create release
        uses: softprops/action-gh-release@01570a1f39cb168c169c802c3bceb9e93fb10974 # v2.1.0
        with:
          draft: false
          files: |
            artifacts/PureRGB-portable.exe
            artifacts/bundle/nsis/*.exe
