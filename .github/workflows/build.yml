name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable 2026-07
        with:
          toolchain: stable

      - uses: swatinem/rust-cache@f0deed1e0edfc6a9be95417288c0e1099b1eeec3 # v2.7.7
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Fetch bundled OpenRGB (SHA-256 verified)
        run: powershell -NoProfile -File scripts/fetch-openrgb.ps1

      - name: Build sidecars (liquidctl + sensord)
        run: powershell -NoProfile -File scripts/build-sidecars.ps1

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: purergb-windows
          path: |
            src-tauri/target/release/purergb.exe
            src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 14

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: purergb-windows
          path: artifacts

      - name: Rename portable exe
        run: |
          cp artifacts/purergb.exe "artifacts/PureRGB-portable.exe" 2>/dev/null || true
          find artifacts -name "*.exe" -type f

      - name: Create release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          draft: false
          files: |
            artifacts/PureRGB-portable.exe
            artifacts/bundle/nsis/*.exe
